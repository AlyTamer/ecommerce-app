# docker-compose.yml  (LOCAL H2)
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecomapp
    ports:
      - "8080:8080"
    environment:
      # Force H2 explicitly (so even if a stray SPRING_DATASOURCE_URL exists, it won’t matter)
      DB_DRIVER: org.h2.Driver
      DB_URL: jdbc:h2:mem:ecomdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
      DB_USERNAME: sa
      DB_PASSWORD: ""
      HIBERNATE_DIALECT: org.hibernate.dialect.H2Dialect
      H2_CONSOLE_ENABLED: "true"
      SPRING_JPA_SHOW_SQL: "true"
