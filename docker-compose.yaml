# docker-compose.yml (LOCAL H2)
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecomapp
    ports:
      - "8080:8080"
    environment:
      H2_CONSOLE_ENABLED: "true"   # optional; defaults to true in your props
      SPRING_JPA_SHOW_SQL: "true"
      # DO NOT set DB_* here → it will use H2 by default
