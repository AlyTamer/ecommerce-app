# App
spring.application.name=EcomApp

# H2 ONLY (no env overrides used)
spring.datasource.driver-class-name=org.h2.Driver

# Choose ONE of the two URLs below:

# A) In-memory DB (fresh on every restart; simplest)
spring.datasource.url=jdbc:h2:mem:ecomdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH

# B) File DB (persists on container filesystem lifetime; still ephemeral on Railway restarts)
# spring.datasource.url=jdbc:h2:file:./.localdb/ecomdb;AUTO_SERVER=TRUE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH

spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate (H2 dialect only)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate

# Flyway uses the SAME H2 datasource
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}

# Safety
spring.sql.init.mode=never

# H2 console (disable on Railway)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# JWT (keep using your envs if you like)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
